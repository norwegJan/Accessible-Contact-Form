<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="styles.css" />
    <script defer src="script.js"></script>

    <title>Frontend Mentor | Accessible Contact form</title>
  </head>
  <body>
    <main>
      <form
        id="main-form"
        class="main-form"
        action=" /"
        method="get"
        novalidate
      >
        <h1>Contact Us</h1>

        <div class="name-fields">
          <div class="input-wrapper">
            <label for="first-name"
              >First Name
              <span class="asterisk" aria-hidden="true">*</span></label
            >
            <input
              type="text"
              name="first-name"
              id="first-name"
              class="name-input"
              autocomplete="given-name"
              required
            />
            <p
              id="error-msg-first-name"
              class="error-msg"
              aria-live="polite"
            ></p>
          </div>

          <div class="input-wrapper">
            <label for="last-name"
              >Last Name
              <span class="asterisk" aria-hidden="true">*</span></label
            >
            <input
              type="text"
              name="last-name"
              id="last-name"
              class="name-input"
              autocomplete="family-name"
              required
            />
            <p
              id="error-msg-last-name"
              class="error-msg"
              aria-live="polite"
            ></p>
          </div>
        </div>

        <div class="input-wrapper">
          <label for="email"
            >Email Address
            <span class="asterisk" aria-hidden="true">*</span></label
          >
          <input
            type="email"
            name="email"
            id="email"
            class="email-input"
            autocomplete="email"
            required
          />
          <p id="error-msg-email" class="error-msg" aria-live="polite"></p>
        </div>

        <fieldset>
          <legend>
            Query Type <span class="asterisk" aria-hidden="true">*</span>
          </legend>

          <div class="radio-inner-wrapper">
            <label class="query-input-label" for="general-enquiry"
              ><input
                id="general-enquiry"
                class="query-input"
                type="radio"
                name="query"
                value="General Enquiry"
                required
                autocomplete="off"
              />General Enquiry</label
            >

            <label class="query-input-label" for="support-request"
              ><input
                id="support-request"
                class="query-input"
                type="radio"
                name="query"
                value="Support Request"
                required
                autocomplete="off"
              />Support Request</label
            >
          </div>

          <p id="error-msg-query" class="error-msg" aria-live="polite"></p>
        </fieldset>

        <div class="input-wrapper">
          <label for="message"
            >Message <span class="asterisk" aria-hidden="true">*</span></label
          >
          <textarea
            name="message"
            id="message"
            class="message"
            required
          ></textarea>
          <p id="error-msg-message" class="error-msg" aria-live="polite"></p>
        </div>

        <div class="checkbox-wrapper">
          <label for="consent" class="consent-input-label"
            ><input
              type="checkbox"
              name="consent"
              value="YES"
              id="consent"
              class="consent-input"
              required
              autocomplete="off"
            />I hereby consent to being contacted by the team<!-- <span class="asterisk" aria-hidden="true">*</span> --></label
          >
          <p id="error-msg-consent" class="error-msg" aria-live="polite"></p>
        </div>

        <button type="submit" id="submit-btn" class="submit-btn">Submit</button>
      </form>

      <div class="success-container hidden">
        <div class="success-header">
          <img src="./assets/images/icon-success-check.svg" alt="" />
          <h2>Message Sent!</h2>
        </div>
        <p>Thanks for completing the form. We'll be in touch soon!</p>
        <button type="button" id="back-btn" class="back-btn">
          Back to form
        </button>
      </div>
    </main>

    <footer class="attribution hidden">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
