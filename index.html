<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="styles.css" />
    <script defer src="script.js"></script>

    <title>Frontend Mentor | Accessible Contact form</title>
  </head>
  <body>
    <main>
      <form
        id="main-form"
        class="main-form"
        action=" /"
        method="get"
        novalidate
      >
        <h1>Contact Us</h1>

        <div class="name-fields">
          <div class="input-wrapper">
            <label for="first-name"
              >First Name <span class="asterisk">*</span></label
            >
            <input type="text" id="first-name" />
            <p id="error-msg-first-name" class="error-msg"></p>
          </div>

          <div class="input-wrapper">
            <label for="last-name"
              >Last Name <span class="asterisk">*</span></label
            >
            <input type="text" id="last-name" />
            <p class="error-msg"></p>
          </div>
        </div>

        <div class="input-wrapper">
          <label for="email"
            >Email Address <span class="asterisk">*</span></label
          >
          <input type="email" id="email" />
          <p class="error-msg"></p>
        </div>

        <fieldset>
          <legend>Query Type <span class="asterisk">*</span></legend>

          <div class="radio-inner-wrapper">
            <label class="radio-input" for="general-enquiry"
              ><input id="general-enquiry" type="radio" name="query" />General
              Enquiry</label
            >

            <label class="radio-input" for="support-request"
              ><input id="support-request" type="radio" name="query" />Support
              Request</label
            >
          </div>

          <p class="error-msg"></p>
        </fieldset>

        <div class="input-wrapper">
          <label for="message">Message <span class="asterisk">*</span></label>
          <textarea id="message" class="message"></textarea>
          <p class="error-msg"></p>
        </div>

        <div class="checkbox-wrapper">
          <label for="consent" class="checkbox-inner-wrapper"
            ><input type="checkbox" id="consent" class="consent" />I consent to
            being contacted by the team<!-- <span class="asterisk">*</span> --></label
          >
          <p class="error-msg"></p>
        </div>

        <button type="submit" id="submit-btn" class="submit-btn">Submit</button>
      </form>

      <div class="success-container">
        <div class="success-header">
          <img src="./assets/images/icon-success-check.svg" alt="" />
          <p>Message Sent!</p>
        </div>
        <p>Thanks for completing the form. We'll be in touch soon!</p>
      </div>
    </main>

    <footer class="attribution hidden">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
