<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="styles.css" />
    <script defer src="script.js"></script>

    <title>Frontend Mentor | Kontaktskjema</title>
  </head>
  <body>
    <main>
      <form
        id="main-form"
        class="main-form"
        action=" /"
        method="get"
        novalidate
      >
        <h1>Kontakt Oss</h1>

        <div class="name-fields">
          <div class="input-wrapper">
            <label for="first-name"
              >Fornavn <span class="asterisk" aria-hidden="true">*</span></label
            >
            <input
              type="text"
              id="first-name"
              class="name-input"
              autocomplete="given-name"
              required
            />
            <p id="error-msg-first-name" class="error-msg"></p>
          </div>

          <div class="input-wrapper">
            <label for="last-name"
              >Etternavn
              <span class="asterisk" aria-hidden="true">*</span></label
            >
            <input
              type="text"
              id="last-name"
              class="name-input"
              autocomplete="family-name"
              required
            />
            <p class="error-msg"></p>
          </div>
        </div>

        <div class="input-wrapper">
          <label for="email"
            >E-postadresse
            <span class="asterisk" aria-hidden="true">*</span></label
          >
          <input
            type="email"
            id="email"
            class="email-input"
            autocomplete="email"
            required
          />
          <p class="error-msg"></p>
        </div>

        <fieldset>
          <legend>
            Formål <span class="asterisk" aria-hidden="true">*</span>
          </legend>

          <div class="radio-inner-wrapper">
            <label class="query-input-label" for="general-enquiry"
              ><input
                id="general-enquiry"
                class="query-input"
                type="radio"
                name="query"
                required
                autocomplete="off"
              />Generell henvendelse</label
            >

            <label class="query-input-label" for="support-request"
              ><input
                id="support-request"
                class="query-input"
                type="radio"
                name="query"
                required
                autocomplete="off"
              />Supportforespørsel</label
            >
          </div>

          <p class="error-msg"></p>
        </fieldset>

        <div class="input-wrapper">
          <label for="message"
            >Beskjed <span class="asterisk" aria-hidden="true">*</span></label
          >
          <textarea id="message" class="message" required></textarea>
          <p class="error-msg"></p>
        </div>

        <div class="checkbox-wrapper">
          <label for="consent" class="consent-input-label"
            ><input
              type="checkbox"
              id="consent"
              class="consent-input"
              required
              autocomplete="off"
            />Jeg godtar med dette å bli kontaktet av teamet<!-- <span class="asterisk" aria-hidden="true">*</span> --></label
          >
          <p class="error-msg"></p>
        </div>

        <button type="submit" id="submit-btn" class="submit-btn">Send</button>
      </form>

      <div class="success-container hidden">
        <div class="success-header">
          <img src="./assets/images/icon-success-check.svg" alt="" />
          <h2>Message Sent!</h2>
        </div>
        <p>Thanks for completing the form. We'll be in touch soon!</p>
      </div>
    </main>

    <footer class="attribution hidden">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
